services:
  listings-db:
    image: postgres:16
    environment:
      POSTGRES_DB: proptrack_listings
      POSTGRES_USER: proptrack
      POSTGRES_PASSWORD: proptrack
    ports:
      - "5432:5432"
    volumes:
      - listings-db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  listings-service:
    build:
      context: ./src/ListingsService
      dockerfile: ListingsService.Api/Dockerfile
    ports:
      - "5100:8080"
    environment:
      ConnectionStrings__ListingsDb: "Host=listings-db;Port=5432;Database=proptrack_listings;Username=proptrack;Password=proptrack"
    depends_on:
      - listings-db

volumes:
  listings-db-data:
