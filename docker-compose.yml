services:
  listings-db:
    image: postgres:16
    environment:
      POSTGRES_DB: proptrack_listings
      POSTGRES_USER: proptrack
      POSTGRES_PASSWORD: proptrack
    ports:
      - "5432:5432"
    volumes:
      - listings-db-data:/var/lib/postgresql/data
      # Schema is now owned by EF Core migrations and data is seeded by the API on
      # startup (see DatabaseInitializer), so no Postgres init scripts are mounted.

  kafka:
    image: apache/kafka:3.8.0
    ports:
      # External listener for clients on the host (e.g. the API run via `dotnet run`).
      - "29092:29092"
    environment:
      # Single-node KRaft (no Zookeeper): this node is both broker and controller.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      # INTERNAL is reachable inside the compose network (kafka:9092); EXTERNAL from the host (localhost:29092).
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  listings-service:
    build:
      context: ./src
      dockerfile: ListingsService/ListingsService.Api/Dockerfile
    ports:
      - "5100:8080"
    environment:
      ConnectionStrings__ListingsDb: "Host=listings-db;Port=5432;Database=proptrack_listings;Username=proptrack;Password=proptrack"
      Kafka__BootstrapServers: "kafka:9092"
    depends_on:
      - listings-db
      - kafka

  auth-db:
    image: postgres:16
    environment:
      POSTGRES_DB: proptrack_auth
      POSTGRES_USER: proptrack
      POSTGRES_PASSWORD: proptrack
    ports:
      # 5432 is taken by listings-db; auth-db gets 5433 on the host.
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data

  auth-service:
    build:
      context: ./src
      dockerfile: AuthService/AuthService.Api/Dockerfile
    ports:
      - "5300:8080"
    environment:
      ConnectionStrings__AuthDb: "Host=auth-db;Port=5432;Database=proptrack_auth;Username=proptrack;Password=proptrack"
      # RSA signing key injected as a file (architecture §6.2). In prod this comes
      # from a secrets manager; locally it's the gitignored dev key bind-mounted below.
      Jwt__PrivateKeyPath: "/run/secrets/jwt_private_key"
    volumes:
      - ./src/AuthService/keys/jwt_private_key.pem:/run/secrets/jwt_private_key:ro
    depends_on:
      - auth-db

  deals-db:
    image: postgres:16
    environment:
      POSTGRES_DB: proptrack_deals
      POSTGRES_USER: proptrack
      POSTGRES_PASSWORD: proptrack
    ports:
      # 5432 (listings-db) and 5433 (auth-db) are taken; deals-db gets 5434.
      - "5434:5432"
    volumes:
      - deals-db-data:/var/lib/postgresql/data

  deals-service:
    build:
      context: ./src
      dockerfile: DealsService/DealsService.Api/Dockerfile
    ports:
      - "5200:8080"
    environment:
      ConnectionStrings__DealsDb: "Host=deals-db;Port=5432;Database=proptrack_deals;Username=proptrack;Password=proptrack"
      Kafka__BootstrapServers: "kafka:9092"
      # Bearer tokens are validated against auth-service's JWKS (in-network URL).
      Jwt__JwksUrl: "http://auth-service:8080/auth/v1/.well-known/jwks.json"
    depends_on:
      - deals-db
      - kafka
      - auth-service

volumes:
  listings-db-data:
  auth-db-data:
  deals-db-data:
