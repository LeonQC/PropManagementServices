services:
  listings-db:
    image: postgres:16
    environment:
      POSTGRES_DB: proptrack_listings
      POSTGRES_USER: proptrack
      POSTGRES_PASSWORD: proptrack
    ports:
      - "5432:5432"
    volumes:
      - listings-db-data:/var/lib/postgresql/data
      # Schema is now owned by EF Core migrations and data is seeded by the API on
      # startup (see DatabaseInitializer), so no Postgres init scripts are mounted.

  kafka:
    image: apache/kafka:3.8.0
    ports:
      # External listener for clients on the host (e.g. the API run via `dotnet run`).
      - "29092:29092"
    environment:
      # Single-node KRaft (no Zookeeper): this node is both broker and controller.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      # INTERNAL is reachable inside the compose network (kafka:9092); EXTERNAL from the host (localhost:29092).
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  listings-service:
    build:
      context: ./src
      dockerfile: ListingsService/ListingsService.Api/Dockerfile
    ports:
      - "5100:8080"
    environment:
      ConnectionStrings__ListingsDb: "Host=listings-db;Port=5432;Database=proptrack_listings;Username=proptrack;Password=proptrack"
      Kafka__BootstrapServers: "kafka:9092"
    depends_on:
      - listings-db
      - kafka

  auth-db:
    image: postgres:16
    environment:
      POSTGRES_DB: proptrack_auth
      POSTGRES_USER: proptrack
      POSTGRES_PASSWORD: proptrack
    ports:
      # 5432 is taken by listings-db; auth-db gets 5433 on the host.
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data

  auth-service:
    build:
      context: ./src
      dockerfile: AuthService/AuthService.Api/Dockerfile
    ports:
      - "5300:8080"
    environment:
      ConnectionStrings__AuthDb: "Host=auth-db;Port=5432;Database=proptrack_auth;Username=proptrack;Password=proptrack"
      # RSA signing key injected as a file (architecture §6.2). In prod this comes
      # from a secrets manager; locally it's the gitignored dev key bind-mounted below.
      Jwt__PrivateKeyPath: "/run/secrets/jwt_private_key"
    volumes:
      - ./src/AuthService/keys/jwt_private_key.pem:/run/secrets/jwt_private_key:ro
    depends_on:
      - auth-db

  deals-db:
    image: postgres:16
    environment:
      POSTGRES_DB: proptrack_deals
      POSTGRES_USER: proptrack
      POSTGRES_PASSWORD: proptrack
    ports:
      # 5432 (listings-db) and 5433 (auth-db) are taken; deals-db gets 5434.
      - "5434:5432"
    volumes:
      - deals-db-data:/var/lib/postgresql/data

  deals-service:
    build:
      context: ./src
      dockerfile: DealsService/DealsService.Api/Dockerfile
    ports:
      - "5200:8080"
    environment:
      ConnectionStrings__DealsDb: "Host=deals-db;Port=5432;Database=proptrack_deals;Username=proptrack;Password=proptrack"
      Kafka__BootstrapServers: "kafka:9092"
      # Bearer tokens are validated against auth-service's JWKS (in-network URL).
      Jwt__JwksUrl: "http://auth-service:8080/auth/v1/.well-known/jwks.json"
    depends_on:
      - deals-db
      - kafka
      - auth-service

  documents-db:
    image: postgres:16
    environment:
      POSTGRES_DB: proptrack_documents
      POSTGRES_USER: proptrack
      POSTGRES_PASSWORD: proptrack
    ports:
      # 5432-5434 are taken (listings/auth/deals); documents-db gets 5435.
      - "5435:5432"
    volumes:
      - documents-db-data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API — presigned URLs from the browser hit this
      - "9001:9001" # web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Browser PUTs to presigned URLs are cross-origin from the Vite dev server.
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:5173"
    volumes:
      - minio-data:/data

  documents-service:
    build:
      context: ./src
      dockerfile: DocumentsService/DocumentsService.Api/Dockerfile
    ports:
      - "5400:8080"
    environment:
      ConnectionStrings__DocumentsDb: "Host=documents-db;Port=5432;Database=proptrack_documents;Username=proptrack;Password=proptrack"
      Kafka__BootstrapServers: "kafka:9092"
      # Bearer tokens are validated against auth-service's JWKS (in-network URL).
      Jwt__JwksUrl: "http://auth-service:8080/auth/v1/.well-known/jwks.json"
      # Server-side S3 ops go in-network; presigned URLs must carry the
      # host-visible endpoint because the browser is what hits them.
      Storage__ServiceUrl: "http://minio:9000"
      Storage__PublicUrl: "http://localhost:9000"
    depends_on:
      - documents-db
      - kafka
      - minio
      - auth-service

  rag-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: proptrack_rag
      POSTGRES_USER: proptrack
      POSTGRES_PASSWORD: proptrack
    ports:
      # 5432-5436 are taken/reserved; rag-db gets 5437.
      - "5437:5432"
    volumes:
      - rag-db-data:/var/lib/postgresql/data

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000" # dev debugging; services reach it in-network
    environment:
      # Supplied via untracked .env next to this file (OPENAI_API_KEY=sk-...).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./src/IngestionService/litellm/config.yaml:/etc//config.yaml:ro

  tei:
    # Optional zero-cost embeddings: docker compose --profile local-embeddings up -d tei
    # First start downloads the ~2.3GB BAAI/bge-m3 model into the cache volume.
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command: --model-id BAAI/bge-m3
    profiles: ["local-embeddings"]
    volumes:
      - tei-cache:/data

  ingestion-service:
    build:
      context: ./src
      dockerfile: IngestionService/Dockerfile
    ports:
      # Dev-only mapping: this is an INTERNAL API (called by ai-service with a
      # service token) — not proxied by the UI or exposed via the gateway.
      - "5500:8080"
    environment:
      DATABASE_URL: "postgresql://proptrack:proptrack@rag-db:5432/proptrack_rag"
      KAFKA_BOOTSTRAP: "kafka:9092"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "proptrack-documents"
      LITELLM_BASE_URL: "http://litellm:4000"
      EMBEDDING_MODEL: "embed-openai" # switch to embed-local for the TEI path (then re-ingest)
      EMBEDDING_DIMENSIONS: "1024"
      JWKS_URL: "http://auth-service:8080/auth/v1/.well-known/jwks.json"
    depends_on:
      - rag-db
      - kafka
      - minio
      - litellm
      - auth-service

volumes:
  listings-db-data:
  auth-db-data:
  deals-db-data:
  documents-db-data:
  minio-data:
  rag-db-data:
  tei-cache:
